name: Release artifacts on main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build application artifacts
        run: ./gradlew build --no-daemon

      - name: Assemble release bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp app-desktop/build/distributions/app-desktop-*.zip release-artifacts/stella-incident-profiler-desktop.zip
          cp app-desktop/build/libs/app-desktop-*.jar release-artifacts/stella-incident-profiler-desktop.jar
          zip -qr release-artifacts/stella-incident-profiler-schemas.zip schemas
          zip -qr release-artifacts/stella-incident-profiler-docs.zip docs README.md README_ja.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md LICENSE_DECISION.md
          zip -qr release-artifacts/stella-incident-profiler-mock-data.zip mock-data examples ui
          (
            cd release-artifacts
            sha256sum * > checksums.txt
          )

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: main-${{ github.run_number }}-${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="main-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          NOTES="$(mktemp)"
          cat > "${NOTES}" <<EOF
          ## Summary
          Automated release artifacts for commit ${GITHUB_SHA} on main.

          ## Artifacts
          - Portable desktop distribution zip
          - Desktop application jar
          - Schema bundle
          - Requirements documentation bundle
          - Mock data and UI resource bundle
          - SHA-256 checksums

          ## Known issues
          Native installers are not produced yet. This initial workflow publishes portable artifacts only.
          EOF
          gh release create "${TAG}" release-artifacts/* \
            --target "${GITHUB_SHA}" \
            --title "Main build ${GITHUB_RUN_NUMBER} (${SHORT_SHA})" \
            --notes-file "${NOTES}"
