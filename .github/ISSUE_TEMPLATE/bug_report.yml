name: Bug report
description: Report a reproducible problem using synthetic data.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, customer data, production logs, captured payload bodies, private AWS account details, or private incident reports.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Use mock data or sanitized synthetic examples.
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version Or Commit
      placeholder: "0.1.0-SNAPSHOT or commit SHA"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Java version, runtime mode, and whether mock mode was used.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy Check
      options:
        - label: I confirm this issue contains only public, synthetic, or sanitized data.
          required: true
